services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline-cafe-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pipeline_cafe?schema=public
    ports:
      - "3001:3001"

  postgres:
    image: postgres:16-alpine
    container_name: pipeline-cafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pipeline_cafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
