services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pipeline-cafe-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pipeline_cafe?schema=public
    ports:
      - "3001:3001"

  postgres:
    image: postgres:16-alpine
    container_name: pipeline-cafe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pipeline_cafe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: pipeline-cafe-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - ./:/workspace

volumes:
  postgres_data:
  jenkins_home:
